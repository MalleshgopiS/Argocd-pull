name: argocd-lfs-wasm
category: DevOps
difficulty: medium
horizon: short

description: |
  The Bleater frontend is deployed via ArgoCD from a Git repository
  that uses Git LFS for large binary artifacts.

  ArgoCD is currently syncing only LFS pointer files instead of actual binaries.
  The frontend crashes due to invalid WASM content, while the API remains healthy.

  Diagnose the issue and ensure that the deployed WASM file is a valid binary.

success_criteria:
  - Frontend pod is running
  - WASM file contains valid binary header
  - WASM file is larger than 8 bytes
  - Pointer file signature no longer exists
  - HTTP endpoint returns 200