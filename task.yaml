name: ArgoCD Git LFS Broken

difficulty: medium

description: |
  The ArgoCD repo-server is not properly handling Git LFS files.

  The bleater-frontend application loads a WebAssembly (WASM)
  binary stored using Git LFS. Because Git LFS support is disabled
  in ArgoCD, the deployment fetches a Git LFS pointer file instead
  of the real WASM binary.

  Your task is to fix the cluster configuration so that:

    1. Git LFS is enabled in the ArgoCD repo-server.
    2. The bleater-frontend Deployment becomes Ready.
    3. The WASM file inside the running pod is the real binary
       (not a Git LFS pointer).
    4. The Deployment UID is preserved
       (do NOT delete and recreate it).
    5. Service endpoints become healthy.

  Constraints:

    - Modify only Kubernetes/ArgoCD configuration.
    - Do NOT delete and recreate deployments.
    - Do NOT modify grader files.
    - Solution must be idempotent.

author: Apex

tags:
  - kubernetes
  - argocd
  - git-lfs
  - devops

estimated_time_minutes: 15