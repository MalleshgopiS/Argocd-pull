name: argocd-lfs-wasm-fix
category: CI/CD Pipeline
difficulty: medium
horizon: short

description: |
  The Bleater frontend crashes because ArgoCD repo-server retrieves
  a Git LFS pointer file instead of the actual WebAssembly binary.

  ArgoCD Application:
    bleater-platform

  The repository secret must enable Git LFS:
    enableLFS: "true"

constraints:
  - Do NOT modify application source
  - Do NOT rebuild container image
  - Do NOT delete or recreate the Deployment
  - Fix must be applied at ArgoCD repo-server level

expected_outcome:
  - Repository secret enables Git LFS
  - repo-server restarts successfully
  - Deployment UID remains unchanged
  - WASM file size exceeds 500KB
  - WASM header equals 00 61 73 6d
  - Frontend pods reach Running state