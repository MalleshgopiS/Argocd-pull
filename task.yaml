apiVersion: apps/v1
kind: Deployment
metadata:
  name: bleater-frontend
  namespace: bleater
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: harbor.devops.local/library/nginx:1.25
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              mkdir -p /app;
              mkdir -p /usr/share/nginx/html;
              cp /wasm/app.wasm /app/app.wasm;
              cp /wasm/app.wasm /usr/share/nginx/html/app.wasm;
              nginx -g 'daemon off;';
          volumeMounts:
            - name: wasm
              mountPath: /wasm
      volumes:
        - name: wasm
          configMap:
            name: wasm-config