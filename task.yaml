name: git-lfs-wasm-fix
category: DevOps
difficulty: medium
horizon: short

description: |
  A Kubernetes deployment serves files directly from a Git repository
  mounted at /workspace/repo.

  The repository tracks app.wasm using Git LFS.

  Currently, only the Git LFS pointer file is present in the mounted
  directory, causing the application to fail.

  The deployment named "bleater-frontend" in namespace "bleater"
  mounts /workspace/repo to /usr/share/nginx/html inside the pod.

  Fix the repository state so that the real LFS object replaces the
  pointer file, and ensure the deployment serves the correct binary.

success_criteria:
  - Deployment becomes Ready
  - Deployed app.wasm matches the real Git LFS object
  - HTTP endpoint returns 200