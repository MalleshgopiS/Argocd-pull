name: argocd-lfs-wasm
category: DevOps
difficulty: medium
horizon: short

description: |
  A Git repository uses Git LFS to store a WASM binary artifact.
  The Kubernetes deployment is currently serving the LFS pointer file
  instead of the actual binary.

  The application fails because the pointer file was deployed
  instead of the real LFS object.

  Fix the issue so that the deployed WASM file matches
  the real Git LFS object stored in the repository.

success_criteria:
  - Deployment becomes ready
  - WASM file matches expected SHA256
  - HTTP endpoint returns 200