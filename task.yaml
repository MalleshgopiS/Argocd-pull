id: argocd-lfs-fix
category: DevOps
difficulty: medium
horizon: short
explanation: |
  A mid-level DevOps engineer should identify the LFS pointer file issue and 
  correct the .gitattributes configuration within 1-2 hours.
prompt: |
  [Context]
  The Bleater frontend is crashing because the WASM binary is being loaded as a 100-byte Git LFS pointer file instead of the actual binary. 
  The ArgoCD `repo-server` is not correctly processing LFS objects.
  
  [Task]
  1. Diagnose why the WASM file is treated as a pointer.
  2. Configure the repository to correctly handle WASM files via Git LFS.
  3. Ensure the ArgoCD application synchronizes and deploys the actual binary.