name: argocd-lfs-wasm-fix

description: >
  The Bleater frontend crashes after ArgoCD deployment because
  Git LFS pointer files are deployed instead of the actual WASM binary.
  The deployed app.wasm file contains a Git LFS pointer instead of a
  valid WebAssembly binary.
  Configure ArgoCD repo-server to correctly fetch Git LFS objects.

category: CI/CD Pipeline
difficulty: medium
horizon: short

constraints:
  - Do NOT modify application source
  - Do NOT rebuild frontend container image
  - Do NOT manually copy files into pods
  - Do NOT recreate the Deployment
  - Fix must be applied at ArgoCD repo-server level

expected_outcome:
  - Repository secret has enableLFS enabled
  - Repo-server supports Git LFS
  - Repo-server restarted successfully
  - app.wasm is a valid binary (not pointer file)
  - WASM magic header equals 00 61 73 6d
  - Frontend pod is Running