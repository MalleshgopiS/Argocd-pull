name: argocd-lfs-wasm-fix
category: CI/CD Pipeline
difficulty: medium
horizon: short

description: |
  The Bleater frontend crashes because ArgoCD repo-server is cloning
  a Git repository that contains a WebAssembly file tracked with Git LFS.
  Instead of downloading the actual binary, ArgoCD retrieves a pointer file.

  The ArgoCD Application managing Bleater is:
    bleater-platform

  The repository secret must be updated to enable Git LFS:
    enableLFS: "true"

constraints:
  - Do NOT modify application source
  - Do NOT rebuild container image
  - Do NOT delete or recreate the Deployment
  - Fix must be applied at ArgoCD repo-server level

expected_outcome:
  - Repository secret enables Git LFS
  - repo-server restarts successfully
  - Deployment UID remains unchanged
  - WASM file is valid binary
  - WASM header equals 00 61 73 6d
  - Frontend pods reach Running state